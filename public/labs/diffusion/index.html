<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ki-school — диффузия двух веществ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF8FF; --surface:#FFFFFF; --surface-2:#F4F0FC;
    --text:#221C2E; --text-secondary:#5C5468; --text-muted:#8E84A3;
    --border:#E6E1F2; --accent:#9974F7; --accent-deep:#6A3FD9; --accent-pale:#EFE9FE;
    --on-accent:#FFFFFF; --radius:14px;
    --font-display:'Fraunces','Iowan Old Style',Georgia,serif;
    --font-body:'Inter',-apple-system,sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  [data-theme="dark"]{
    --bg:#15131C; --surface:#1D1A26; --surface-2:#241F30;
    --text:#ECE8F7; --text-secondary:#A89FC2; --text-muted:#766C90;
    --border:#2E293D; --accent:#9974F7; --accent-deep:#C7B3FB; --accent-pale:#2A2240;
    --on-accent:#1B1428;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--font-body);
    padding:20px; transition:background .3s ease, color .3s ease;
  }
  .viz-wrap{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    margin-bottom:18px; overflow:hidden; position:relative;
  }
  canvas{display:block; width:100%; height:300px;}

  .panel{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px; display:flex; flex-direction:column; gap:14px;
  }
  .control-row{display:flex; align-items:center; gap:14px;}
  .control-row label{font-size:13px; color:var(--text-secondary); width:120px; flex-shrink:0;}
  input[type=range]{
    -webkit-appearance:none; flex:1; height:4px;
    background:var(--surface-2); border-radius:4px; outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:var(--accent); cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:16px; height:16px; border-radius:50%; border:none;
    background:var(--accent); cursor:pointer;
  }
  .value-readout{font-family:var(--font-mono); font-size:13px; color:var(--text-secondary); width:60px; text-align:right;}
  .value-readout b{color:var(--text); font-weight:500;}

  .stats-row{display:flex; gap:24px; flex-wrap:wrap;}
  .stat{display:flex; flex-direction:column; gap:2px;}
  .stat-label{font-size:11px; color:var(--text-muted); font-family:var(--font-mono); letter-spacing:.04em;}
  .stat-value{font-family:var(--font-mono); font-size:16px; color:var(--text); font-weight:500;}

  .actions{display:flex; gap:10px;}
  .btn-primary{
    background:var(--accent); color:var(--on-accent); padding:10px 18px; border:none;
    border-radius:9px; font-family:var(--font-body); font-weight:500; font-size:13px; cursor:pointer;
    transition:opacity .25s ease;
  }
  .btn-primary:hover{opacity:.9;}
  .btn-secondary{
    background:none; border:1px solid var(--border); color:var(--text); padding:10px 18px;
    border-radius:9px; font-family:var(--font-body); font-weight:500; font-size:13px; cursor:pointer;
    transition:border-color .25s ease, color .25s ease;
  }
  .btn-secondary:hover{border-color:var(--accent); color:var(--accent-deep);}
</style>
</head>
<body>

  <div class="viz-wrap">
    <canvas id="viz"></canvas>
  </div>

  <div class="panel">
    <div class="control-row">
      <label>Скорость</label>
      <input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">
      <span class="value-readout" id="speed-out"><b>1.0</b>×</span>
    </div>

    <div class="control-row">
      <label>Кол-во частиц</label>
      <input type="range" id="count" min="20" max="120" step="5" value="65">
      <span class="value-readout" id="count-out"><b>65</b></span>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-label">ВРЕМЯ</div>
        <div class="stat-value" id="time-out">0.0 с</div>
      </div>
      <div class="stat">
        <div class="stat-label">СМЕШИВАНИЕ</div>
        <div class="stat-value" id="mix-out">0%</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="playBtn">Запустить</button>
      <button class="btn-secondary" id="resetBtn">Сбросить</button>
    </div>
  </div>

<script>
  (function () {
    var params = new URLSearchParams(location.search);
    document.documentElement.setAttribute('data-theme', params.get('theme') || 'light');

    window.addEventListener('message', function (e) {
      if (e.data && e.data.type === 'theme') {
        document.documentElement.setAttribute('data-theme', e.data.value);
      }
    });
  })();

  // --- получение цветов из css-переменных (с учётом темы) ---
  function cssVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  const canvas = document.getElementById('viz');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0, dpr = window.devicePixelRatio || 1;

  function resizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // --- модель частиц ---
  let COUNT_PER_SIDE = 65;
  const RADIUS = 6;
  const BASE_SPEED = 55; // px/сек

  let particles = [];
  let running = false;
  let elapsed = 0;
  let speedMult = 1;

  function rand(min, max){ return min + Math.random() * (max - min); }

  function makeParticles(){
    particles = [];
    elapsed = 0;
    // вещество A заполняет верхнюю половину, вещество B - нижнюю
    for(let i = 0; i < COUNT_PER_SIDE; i++){
      particles.push(spawnParticle('A', RADIUS, H * 0.06, H * 0.47));
    }
    for(let i = 0; i < COUNT_PER_SIDE; i++){
      particles.push(spawnParticle('B', RADIUS, H * 0.53, H * 0.94));
    }
  }

  function spawnParticle(type, r, yMin, yMax){
    let p, tries = 0;
    do{
      p = {
        type,
        r,
        x: rand(r + 2, W - r - 2),
        y: rand(yMin, yMax),
        vx: rand(-1, 1),
        vy: rand(-1, 1)
      };
      tries++;
    } while(tries < 12 && overlapsAny(p));
    const norm = Math.hypot(p.vx, p.vy) || 1;
    p.vx = (p.vx / norm) * BASE_SPEED;
    p.vy = (p.vy / norm) * BASE_SPEED;
    return p;
  }

  function overlapsAny(p){
    for(const q of particles){
      const dx = p.x - q.x, dy = p.y - q.y;
      if(Math.hypot(dx, dy) < (p.r + q.r) * 1.3) return true;
    }
    return false;
  }

  function resolveCollision(a, b){
    const dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.hypot(dx, dy);
    const minDist = a.r + b.r;
    if(dist === 0){ dist = 0.01; }
    if(dist < minDist){
      const overlap = (minDist - dist) / 2;
      const nx = dx / dist, ny = dy / dist;
      a.x -= nx * overlap; a.y -= ny * overlap;
      b.x += nx * overlap; b.y += ny * overlap;
      const va = a.vx * nx + a.vy * ny;
      const vb = b.vx * nx + b.vy * ny;
      a.vx += (vb - va) * nx; a.vy += (vb - va) * ny;
      b.vx += (va - vb) * nx; b.vy += (va - vb) * ny;
    }
  }

  function step(dt){
    for(const p of particles){
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if(p.x - p.r < 0){ p.x = p.r; p.vx = Math.abs(p.vx); }
      if(p.x + p.r > W){ p.x = W - p.r; p.vx = -Math.abs(p.vx); }
      if(p.y - p.r < 0){ p.y = p.r; p.vy = Math.abs(p.vy); }
      if(p.y + p.r > H){ p.y = H - p.r; p.vy = -Math.abs(p.vy); }
    }
    for(let i = 0; i < particles.length; i++){
      for(let j = i + 1; j < particles.length; j++){
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        if(Math.abs(dx) < a.r + b.r + 1 && Math.abs(dy) < a.r + b.r + 1){
          resolveCollision(a, b);
        }
      }
    }
    elapsed += dt;
  }

  function computeMixing(){
    const midY = H / 2;
    let aTotal = 0, aWrong = 0, bTotal = 0, bWrong = 0;
    for(const p of particles){
      if(p.type === 'A'){
        aTotal++;
        if(p.y > midY) aWrong++;
      } else {
        bTotal++;
        if(p.y < midY) bWrong++;
      }
    }
    const mixA = aTotal ? aWrong / aTotal : 0;
    const mixB = bTotal ? bWrong / bTotal : 0;
    return Math.min(100, Math.round(((mixA + mixB) / 2) * 200));
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    const colorA = cssVar('--accent');
    const colorB = cssVar('--text-muted');
    for(const p of particles){
      ctx.beginPath();
      ctx.fillStyle = p.type === 'A' ? colorA : colorB;
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function updateReadouts(){
    document.getElementById('time-out').textContent = elapsed.toFixed(1) + ' с';
    document.getElementById('mix-out').textContent = computeMixing() + '%';
  }

  let lastTs = null;
  function loop(ts){
    if(lastTs === null) lastTs = ts;
    let dt = (ts - lastTs) / 1000;
    lastTs = ts;
    dt = Math.min(dt, 0.05); // защита от рывков при переключении вкладки

    if(running){
      step(dt * speedMult);
    }
    draw();
    updateReadouts();
    requestAnimationFrame(loop);
  }

  // --- управление ---
  const speedInput = document.getElementById('speed');
  const speedOut = document.querySelector('#speed-out b');
  speedInput.addEventListener('input', (e) => {
    speedMult = parseFloat(e.target.value);
    speedOut.textContent = speedMult.toFixed(1);
  });

  const countInput = document.getElementById('count');
  const countOut = document.querySelector('#count-out b');
  countInput.addEventListener('input', (e) => {
    COUNT_PER_SIDE = parseInt(e.target.value, 10);
    countOut.textContent = COUNT_PER_SIDE;
    lastTs = null;
    makeParticles();
  });

  const playBtn = document.getElementById('playBtn');
  playBtn.addEventListener('click', () => {
    running = !running;
    playBtn.textContent = running ? 'Пауза' : 'Запустить';
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    running = false;
    playBtn.textContent = 'Запустить';
    lastTs = null;
    makeParticles();
    draw();
    updateReadouts();
  });

  // --- инициализация ---
  function init(){
    resizeCanvas();
    makeParticles();
    draw();
    updateReadouts();
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    // частицы пересоздаём, чтобы не оказались за пределами канваса
    makeParticles();
  });

  init();
  requestAnimationFrame(loop);
</script>

</body>
</html>
